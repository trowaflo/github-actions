name: Validate Renovate Config

# Reusable workflow — Validation des fichiers de configuration Renovate
# Usage: uses: trowaflo/github-actions/.github/workflows/validate-renovate.yml@<sha>

on:
  workflow_call:
    inputs:
      enable_harden_runner:
        description: "Runtime security via StepSecurity harden-runner"
        type: boolean
        default: true
      harden_runner_egress_policy:
        description: "Harden-runner egress policy: audit (observe) or block (enforce allowlist)"
        type: string
        default: "block"
      harden_runner_allowed_endpoints:
        description: "Extra endpoints to allow (merged with built-in defaults, space-separated)"
        type: string
        default: ""
      node_version:
        description: "Node.js version for renovate-config-validator"
        type: string
        default: "24"
      config_files:
        description: "Glob pattern of files to validate (default: *.json *.json5 at root)"
        type: string
        default: ""

permissions: {}

jobs:
  validate:
    name: Renovate Config Validator
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Built-in defaults — always applied, merged with inputs.harden_runner_allowed_endpoints
      _HARDEN_DEFAULTS: >-
        agent.api.stepsecurity.io:443
        github.com:443
        api.github.com:443
        registry.npmjs.org:443
        nodejs.org:443
        release-assets.githubusercontent.com:443
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable_harden_runner }}
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: ${{ inputs.harden_runner_egress_policy }}
          allowed-endpoints: ${{ env._HARDEN_DEFAULTS }} ${{ inputs.harden_runner_allowed_endpoints }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ inputs.node_version }}

      - name: Install renovate
        # renovate: datasource=npm depName=renovate
        run: npm install --global renovate@43.104.6

      - name: Validate Renovate config files
        env:
          CONFIG_FILES: ${{ inputs.config_files }}
        run: |
          exit_code=0
          if [ -n "$CONFIG_FILES" ]; then
            files="$CONFIG_FILES"
          else
            files=$(find . -maxdepth 1 -name '*renovate*' \( -name '*.json' -o -name '*.json5' \) 2>/dev/null || true)
          fi
          for f in $files; do
            if [ -f "$f" ]; then
              echo "--- Validating $f ---"
              if ! renovate-config-validator "$f"; then
                exit_code=1
              fi
            fi
          done
          exit $exit_code
