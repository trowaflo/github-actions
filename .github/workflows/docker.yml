name: Docker

# Reusable workflow — Docker Build & Container Scanning
# Usage: uses: trowaflo/github-actions/.github/workflows/docker.yml@<sha>
#
# Ordre garanti quand enable_build=true :
#   1. Build → push staging tag (ex: :scan-{run_id})
#   2. Scan Trivy et/ou grype sur le staging tag
#   3. Publish final (bake avec les tags originaux du bake file, depuis le cache)
# Si un scan échoue, le job échoue → le publish final ne s'exécute pas.
#
# Mode scan-only (enable_build=false) : jobs trivy-scan et grype-scan indépendants,
# tournent sur une image existante dans le registre (image_name ou défaut).
#
# Multi-platform : le staging build utilise le cache buildx du runner.
# Le bake file contrôle les platforms cibles — aucune restriction de ce workflow.
#
# Enable_trivy et enable_grype sont indépendants.
# Activer les deux permet de comparer la couverture dans le temps.
# Trivy (aquasecurity) et grype (Anchore/Cisco) couvrent le même besoin (CVEs dans images)
# mais ont des bases de données et heuristiques différentes.
#
# image_name : si non fourni, utilise {registry}/{github.repository} par défaut.

on:
  workflow_call:
    inputs:
      enable_harden_runner:
        description: "Runtime security via StepSecurity harden-runner"
        type: boolean
        default: true
      harden_runner_egress_policy:
        description: "Harden-runner egress policy: audit (observe) or block (enforce allowlist)"
        type: string
        default: "block"
      harden_runner_allowed_endpoints:
        description: "Allowed endpoints when egress-policy is block (space-separated, e.g. github.com:443 pypi.org:443)"
        type: string
        # ghcr.io registry, trivy DB (mirror.gcr.io), trivy install
        default: >-
          github.com:443
          api.github.com:443
          ghcr.io:443
          pkg-containers.githubusercontent.com:443
          get.trivy.dev:443
          mirror.gcr.io:443
      enable_build:
        description: "Docker build & push via bake"
        type: boolean
        default: false
      enable_trivy:
        description: "CVE scan via Trivy (aquasecurity)"
        type: boolean
        default: false
      enable_grype:
        description: "CVE scan via grype (Anchore/Cisco)"
        type: boolean
        default: false
      registry:
        description: "Target Docker registry"
        type: string
        default: "ghcr.io"
      image_name:
        description: "Image name (e.g., owner/image) — defaults to {registry}/{github.repository}"
        type: string
        default: ""
      trivy_severity:
        description: "Trivy severity levels (empty = all)"
        type: string
        default: ""
      grype_severity_cutoff:
        description: "Grype minimum severity to fail build (negligible, low, medium, high, critical)"
        type: string
        default: "negligible"
    secrets:
      registry_username:
        description: "Docker registry username (optional — uses GITHUB_TOKEN for ghcr.io)"
        required: false
      registry_password:
        description: "Docker registry password (optional — uses GITHUB_TOKEN for ghcr.io)"
        required: false

permissions: {}

jobs:
  docker:
    if: ${{ inputs.enable_build }}
    name: Docker Build → Scan → Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable_harden_runner }}
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: ${{ inputs.harden_runner_egress_policy }}
          allowed-endpoints: ${{ inputs.harden_runner_allowed_endpoints }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.registry_username || github.actor }}
          password: ${{ secrets.registry_password || secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # ── Phase 1 : build staging tag (pour le scan) ─────────────────────────
      # Skippé si aucun scan activé (on passe directement au publish final)
      - name: Set staging tag
        id: staging
        if: ${{ inputs.enable_trivy || inputs.enable_grype }}
        env:
          REGISTRY: ${{ inputs.registry }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: echo "tag=${REGISTRY}/${REPOSITORY}:scan-${RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Build staging image
        if: ${{ inputs.enable_trivy || inputs.enable_grype }}
        uses: docker/bake-action@82490499d2e5613fcead7e128237ef0b0ea210f7 # v7.0.0
        with:
          push: true
          set: |
            *.tags=${{ steps.staging.outputs.tag }}

      # ── Phase 2 : scan ─────────────────────────────────────────────────────
      # Si un scan échoue, le job échoue et la phase 3 (publish) ne s'exécute pas.
      - name: Trivy scan
        if: ${{ inputs.enable_trivy }}
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.staging.outputs.tag }}
          format: table
          severity: ${{ inputs.trivy_severity }}
          exit-code: "1"

      - name: Trivy scan (SARIF)
        if: ${{ always() && inputs.enable_trivy }}
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.staging.outputs.tag }}
          format: sarif
          output: trivy-results.sarif
          severity: ${{ inputs.trivy_severity }}

      - name: Upload Trivy SARIF
        if: ${{ always() && inputs.enable_trivy }}
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

      - name: Grype scan
        if: ${{ inputs.enable_grype }}
        id: grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ steps.staging.outputs.tag }}
          fail-build: true
          severity-cutoff: ${{ inputs.grype_severity_cutoff }}

      - name: Upload Grype SARIF
        if: ${{ always() && inputs.enable_grype }}
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype-container

      # ── Phase 3 : publish final ────────────────────────────────────────────
      # Tags définis par le bake file du consumer. Cache buildx = republication quasi-instantanée.
      - name: Publish final image
        uses: docker/bake-action@82490499d2e5613fcead7e128237ef0b0ea210f7 # v7.0.0
        with:
          push: true

      # ── Nettoyage staging tag ──────────────────────────────────────────────
      # Tourne même si le scan a échoué (always) — le staging a été pushé dans tous les cas.
      # continue-on-error : la suppression n'est pas critique, la rétention ghcr.io (90j) prend le relais.
      - name: Delete staging tag
        if: ${{ always() && (inputs.enable_trivy || inputs.enable_grype) }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          PACKAGE_NAME: ${{ github.event.repository.name }}
          TAG_NAME: scan-${{ github.run_id }}
        run: |
          # Try org API first, fall back to user API (one will 404 depending on account type)
          VERSION_ID=$(
            gh api "/orgs/${OWNER}/packages/container/${PACKAGE_NAME}/versions" \
              --jq ".[] | select(.metadata.container.tags[]? == \"${TAG_NAME}\") | .id" 2>/dev/null \
            || gh api "/users/${OWNER}/packages/container/${PACKAGE_NAME}/versions" \
              --jq ".[] | select(.metadata.container.tags[]? == \"${TAG_NAME}\") | .id" \
            || echo ""
          )
          if [ -n "$VERSION_ID" ]; then
            gh api --method DELETE "/orgs/${OWNER}/packages/container/${PACKAGE_NAME}/versions/${VERSION_ID}" 2>/dev/null \
              || gh api --method DELETE "/users/${OWNER}/packages/container/${PACKAGE_NAME}/versions/${VERSION_ID}" \
              || echo "Delete failed — will expire per ghcr.io retention policy (90 days)"
            echo "Deleted staging tag: ${TAG_NAME}"
          else
            echo "Staging version not found — will expire per ghcr.io retention policy (90 days)"
          fi

  # ── Mode scan-only (enable_build=false) ────────────────────────────────────
  # Tourne sur une image existante dans le registre.

  trivy-scan:
    if: ${{ inputs.enable_trivy && !inputs.enable_build }}
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable_harden_runner }}
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: ${{ inputs.harden_runner_egress_policy }}
          allowed-endpoints: ${{ inputs.harden_runner_allowed_endpoints }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Trivy scan (table)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: "${{ inputs.image_name != '' && inputs.image_name || format('{0}/{1}', inputs.registry, github.repository) }}"
          format: table
          severity: ${{ inputs.trivy_severity }}
          exit-code: "1"
      - name: Trivy scan (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: "${{ inputs.image_name != '' && inputs.image_name || format('{0}/{1}', inputs.registry, github.repository) }}"
          format: sarif
          output: trivy-results.sarif
          severity: ${{ inputs.trivy_severity }}
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

  grype-scan:
    if: ${{ inputs.enable_grype && !inputs.enable_build }}
    name: Container Scan (grype)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable_harden_runner }}
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: ${{ inputs.harden_runner_egress_policy }}
          allowed-endpoints: ${{ inputs.harden_runner_allowed_endpoints }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Grype scan
        id: grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: "${{ inputs.image_name != '' && inputs.image_name || format('{0}/{1}', inputs.registry, github.repository) }}"
          fail-build: true
          severity-cutoff: ${{ inputs.grype_severity_cutoff }}
      - name: Upload Grype SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: grype-container
