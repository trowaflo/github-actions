# DEPRECATED — Migrer vers ha.yml (enable_integration: true).
# Conservé pour rétrocompatibilité (consumer: frigate-event-manager).
# Sera supprimé après migration de frigate-event-manager vers ha.yml.
name: HA Python CI

on:
  workflow_call:
    inputs:
      python_version:
        description: "Python version to use"
        type: string
        default: "3.13"
      component_name:
        description: "Custom component name (for coverage path)"
        type: string
        required: true

permissions: {}

jobs:
  test-python:
    name: pytest
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install dependencies
        run: pip install pytest pytest-cov "pytest-homeassistant-custom-component==0.13.316"

      - name: Run tests
        env:
          COMPONENT_NAME: ${{ inputs.component_name }}
        run: pytest --cov="custom_components/$COMPONENT_NAME" --cov-report=xml --cov-fail-under=80 tests/ -v

      - name: Upload coverage
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        with:
          fail_ci_if_error: true

  lint-python:
    name: ruff
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check .
