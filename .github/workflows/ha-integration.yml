name: HA Python CI

on:
  workflow_call:
    inputs:
      python_version:
        description: "Python version to use"
        type: string
        default: "3.13"
      component_name:
        description: "Custom component name (for coverage path)"
        type: string
        required: true

jobs:
  test-python:
    name: "Python Tests & Coverage (80%+)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install dependencies
        run: pip install pytest pytest-cov "pytest-homeassistant-custom-component==0.13.316"

      - name: Run tests
        env:
          COMPONENT_NAME: ${{ inputs.component_name }}
        run: pytest --cov=custom_components/$COMPONENT_NAME --cov-fail-under=80 tests/ -v

  lint-python:
    name: "Code Quality - Python (ruff)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check .
