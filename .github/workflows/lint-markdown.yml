# DEPRECATED — Migrer vers quality.yml (enable_markdown_lint: true).
# Conservé pour rétrocompatibilité (consumer: frigate-event-manager).
# Sera supprimé après migration de frigate-event-manager vers quality.yml.
name: Markdown Lint

on:
  workflow_call:
    inputs:
      enable_harden_runner:
        description: "Network monitoring via StepSecurity harden-runner (egress audit)"
        type: boolean
        default: false

permissions: {}

jobs:
  lint-markdown:
    name: markdownlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable_harden_runner }}
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@07035fd053f7be764496c0f8d8f9f41f98305101 # v22.0.0
        with:
          globs: |
            **/*.md
            !.venv/**
