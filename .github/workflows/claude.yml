name: Claude

# Workflow local — Claude Code pour ce repo uniquement.
# Restreint au propriétaire du repo (github.repository_owner) pour éviter
# les déclenchements non autorisés sur un repo public.
# Délègue au workflow réutilisable claude-code.yml.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: github.actor == github.repository_owner
    uses: ./.github/workflows/claude-code.yml
    secrets:
      claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
