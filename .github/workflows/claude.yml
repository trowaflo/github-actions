name: Claude

# Local workflow — Claude Code for this repo
# Enables @claude mentions in issues/PRs and /review command in PR comments.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude-code:
    uses: ./.github/workflows/release.yml
    with:
      enable_claude_code: true
    secrets:
      claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

  claude-review:
    uses: ./.github/workflows/release.yml
    with:
      enable_claude_review: true
    secrets:
      claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
