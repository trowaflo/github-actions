name: Helm

# Reusable workflow — Helm Charts CI/CD
# Usage: uses: trowaflo/github-actions/.github/workflows/helm.yml@<sha>
#
# Tous les jobs sont domaine-spécifiques → false par défaut (opt-in explicite)

on:
  workflow_call:
    inputs:
      enable_harden_runner:
        description: "Monitoring réseau des runners via StepSecurity harden-runner (egress audit)"
        type: boolean
        default: false
      enable_release:
        description: "Release des charts via chart-releaser"
        type: boolean
        default: false
      enable_lint:
        description: "Lint des charts avec chart-testing (ct lint)"
        type: boolean
        default: false
      enable_unittest:
        description: "Unit tests Helm avec helm-unittest"
        type: boolean
        default: false
      enable_docs:
        description: "Génération de la documentation avec helm-docs"
        type: boolean
        default: false
      enable_bump:
        description: "Auto-bump de version des charts modifiés sur PR"
        type: boolean
        default: false
      enable_pr_charts:
        description: "Packaging des charts modifiés sur PR (commentaire de téléchargement)"
        type: boolean
        default: false
      enable_pr_cleanup:
        description: "Nettoyage des commentaires de charts après merge/fermeture PR"
        type: boolean
        default: false
      charts_dir:
        description: "Répertoire racine des charts Helm"
        type: string
        default: "charts"

jobs:
  helm-release:
    if: ${{ inputs.enable_release == true }}
    name: Helm Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable_harden_runner == true }}
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: azure/setup-helm@1a275c3b7ec2dc2980e7e9f5f06b6c6d9c98df44 # v4.3.1
      - uses: helm/chart-releaser-action@a0d2dc62c5e491af8ef6ba64a2e02bcf3fb33aa1 # v1.7.0
        with:
          charts_dir: ${{ inputs.charts_dir }}
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  helm-lint:
    if: ${{ inputs.enable_lint == true }}
    name: Helm Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable_harden_runner == true }}
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: azure/setup-helm@1a275c3b7ec2dc2980e7e9f5f06b6c6d9c98df44 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.x"
      - uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0
      - name: Run ct lint
        env:
          CHARTS_DIR: ${{ inputs.charts_dir }}
        run: ct lint --chart-dirs "$CHARTS_DIR"

  helm-unittest:
    if: ${{ inputs.enable_unittest == true }}
    name: Helm Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable_harden_runner == true }}
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: azure/setup-helm@1a275c3b7ec2dc2980e7e9f5f06b6c6d9c98df44 # v4.3.1
      - name: Cache helm plugins
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.local/share/helm/plugins
          key: helm-unittest-${{ runner.os }}
      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git || true
      - name: Run helm unittest
        env:
          CHARTS_DIR: ${{ inputs.charts_dir }}
        run: |
          helm unittest "$CHARTS_DIR"/* \
            --output-type JUnit \
            --output-file test-results.xml
      - uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        if: always()
        with:
          files: test-results.xml

  helm-docs:
    if: ${{ inputs.enable_docs == true }}
    name: Helm Docs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable_harden_runner == true }}
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install helm-docs v1.14.2 with checksum verification
        run: |
          set -euo pipefail
          VERSION=1.14.2
          ARCHIVE="helm-docs_${VERSION}_Linux_x86_64.tar.gz"
          BASE_URL="https://github.com/norwoodj/helm-docs/releases/download/v${VERSION}"
          curl -fsSLO "${BASE_URL}/${ARCHIVE}"
          curl -fsSLO "${BASE_URL}/checksums.txt"
          grep " ${ARCHIVE}$" checksums.txt | sha256sum -c -
          tar -xzf "${ARCHIVE}" helm-docs
          chmod +x helm-docs
      - name: Generate docs
        env:
          CHARTS_DIR: ${{ inputs.charts_dir }}
        run: ./helm-docs --chart-search-root "$CHARTS_DIR"
      - name: Commit updated docs
        env:
          CHARTS_DIR: ${{ inputs.charts_dir }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add "$CHARTS_DIR" && git commit -m "docs: update helm-docs" && git push)

  helm-bump:
    if: ${{ inputs.enable_bump == true }}
    name: Helm Version Bump
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable_harden_runner == true }}
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
      - name: Bump chart versions
        env:
          CHARTS_DIR: ${{ inputs.charts_dir }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          npm install --global semver
          for chart in "$CHARTS_DIR"/*/Chart.yaml; do
            if git diff --name-only "origin/$BASE_REF..HEAD" | grep -q "$(dirname "$chart")/"; then
              current=$(grep '^version:' "$chart" | awk '{print $2}')
              bumped=$(semver -i patch "$current")
              sed -i "s/^version: .*/version: $bumped/" "$chart"
              echo "Bumped $(dirname $chart): $current → $bumped"
            fi
          done
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add "$CHARTS_DIR" && git commit -m "chore: bump chart versions" && git push)

  helm-pr-charts:
    if: ${{ inputs.enable_pr_charts == true && github.event_name == 'pull_request' }}
    name: PR Chart Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable_harden_runner == true }}
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: azure/setup-helm@1a275c3b7ec2dc2980e7e9f5f06b6c6d9c98df44 # v4.3.1
      - name: Package changed charts
        env:
          CHARTS_DIR: ${{ inputs.charts_dir }}
        run: |
          mkdir -p /tmp/charts
          for chart in "$CHARTS_DIR"/*/; do
            helm package "$chart" --destination /tmp/charts/
          done
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: helm-charts-pr-${{ github.event.number }}
          path: /tmp/charts/*.tgz
          retention-days: 7
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### Helm Charts packagés\n\n📦 [Télécharger les charts](${runUrl})\n\n> Disponible 7 jours.`
            });

  helm-pr-cleanup:
    if: ${{ inputs.enable_pr_cleanup == true && github.event_name == 'pull_request' }}
    name: PR Chart Cleanup
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable_harden_runner == true }}
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: audit
      - uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const comment of comments.data) {
              if (comment.body.includes('Helm Charts packagés')) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }
