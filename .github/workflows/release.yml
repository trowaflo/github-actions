name: Release

# Reusable workflow — Release Management & Claude Code
# Usage: uses: trowaflo/github-actions/.github/workflows/release.yml@<sha>
#
# Tous les jobs sont opt-in (false par défaut).

on:
  workflow_call:
    inputs:
      enable_release_please:
        description: "Automated releases via release-please"
        type: boolean
        default: false
      enable_claude_code:
        description: "Claude Code action — répond aux mentions @claude dans les issues/PRs"
        type: boolean
        default: false
      enable_claude_review:
        description: "Claude Code Review — répond à /review dans les PR comments"
        type: boolean
        default: false
      release_config_file:
        description: "Chemin vers release-please-config.json"
        type: string
        default: ""
      release_manifest_file:
        description: "Chemin vers .release-please-manifest.json"
        type: string
        default: ""
    secrets:
      release_token:
        description: "PAT pour release-please (optionnel — utilise GITHUB_TOKEN si absent)"
        required: false
      claude_code_oauth_token:
        description: "Token OAuth Claude Code (optionnel)"
        required: false

jobs:
  release-please:
    if: ${{ inputs.enable_release_please == true }}
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        with:
          token: ${{ secrets.release_token || secrets.GITHUB_TOKEN }}
          config-file: ${{ inputs.release_config_file || 'release-please-config.json' }}
          manifest-file: ${{ inputs.release_manifest_file || '.release-please-manifest.json' }}

  claude-code:
    if: ${{ inputs.enable_claude_code == true }}
    name: Claude Code
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@d10238b61062adaa9f3775488f0d57067c4500c5 # v1.0.88
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.claude_code_oauth_token }}

  claude-review:
    if: ${{ inputs.enable_claude_review == true }}
    name: Claude Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@d10238b61062adaa9f3775488f0d57067c4500c5 # v1.0.88
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_code_oauth_token: ${{ secrets.claude_code_oauth_token }}
          trigger_phrase: "/review"
          direct_prompt: "Review this pull request. Focus on correctness, security, and maintainability."
