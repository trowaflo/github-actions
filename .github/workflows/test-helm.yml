name: Test Helm Workflows

# Validates ci-helm.yml, release-helm.yml, and ci-helm-cleanup.yml using
# the hello-world test fixture chart in tests/charts/.
#
# Triggered:
#   - workflow_dispatch (manual)
#   - pull_request (every PR)

on:
  workflow_dispatch:
  pull_request:

permissions: {}

jobs:
  helm-ci:
    name: Test ci-helm.yml
    uses: ./.github/workflows/ci-helm.yml
    permissions:
      contents: write
      pull-requests: write
      checks: write
    with:
      enable_lint: true
      enable_unittest: true
      enable_bump: true
      enable_docs: true
      enable_docs_check: true
      enable_pr_charts: true
      charts_dir: tests/charts
      harden_runner_egress_policy: block

  helm-release:
    name: Test release-helm.yml
    uses: ./.github/workflows/release-helm.yml
    permissions:
      contents: write
      pages: write
    with:
      enable_release: true
      harden_runner_egress_policy: block

  helm-pr-cleanup:
    name: Test ci-helm-cleanup.yml
    needs: [helm-ci]
    uses: ./.github/workflows/ci-helm-cleanup.yml
    permissions:
      contents: write
      pull-requests: write
    with:
      skip_event_check: true
      harden_runner_egress_policy: block
