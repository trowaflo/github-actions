name: Security

# Reusable workflow — Secret scanning + IaC security scanning
# Usage: uses: trowaflo/github-actions/.github/workflows/security.yml@<sha>
#
# Defaults security-on : gitleaks, kics = true (opt-out)
# Defaults opt-in : dependency-review, checkov, trivy = false

on:
  workflow_call:
    inputs:
      checkov_framework:
        description: "Checkov framework: terraform, kubernetes, helm, dockerfile, or empty for all"
        type: string
        default: ""
      enable_checkov:
        description: "IaC misconfiguration scanning with Checkov"
        type: boolean
        default: false
      enable_dependency_review:
        description: "Dependency review on PR — requires pull_request event"
        type: boolean
        default: false
      enable_gitleaks:
        description: "Secret scanning with gitleaks"
        type: boolean
        default: true
      enable_harden_runner:
        description: "Runtime security via StepSecurity harden-runner"
        type: boolean
        default: true
      enable_kics:
        description: "IaC scanning with KICS"
        type: boolean
        default: true
      enable_trivy:
        description: "IaC/filesystem scanning with Trivy"
        type: boolean
        default: false
      harden_runner_allowed_endpoints:
        description: "Extra endpoints to allow (merged with built-in defaults, space-separated)"
        type: string
        default: ""
      harden_runner_egress_policy:
        description: "Harden-runner egress policy: audit (observe) or block (enforce allowlist)"
        type: string
        default: "audit"
      trivy_severity:
        description: "Trivy severity levels: UNKNOWN, LOW, MEDIUM, HIGH, CRITICAL"
        type: string
        default: "UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL"

permissions: {}

jobs:
  gitleaks:
    if: ${{ inputs.enable_gitleaks }}
    name: Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      # Built-in defaults — always applied, merged with inputs.harden_runner_allowed_endpoints
      # 9236a389bd48b984df91adc1bc924620.r2.cloudflarestorage.com: KICS queries (Checkmarx R2 storage)
      _HARDEN_DEFAULTS: >-
        9236a389bd48b984df91adc1bc924620.r2.cloudflarestorage.com:443
        agent.api.stepsecurity.io:443
        api.github.com:443
        api0.prismacloud.io:443
        apk.cgr.dev:443
        files.pythonhosted.org:443
        get.trivy.dev:443
        ghcr.io:443
        github.com:443
        kics.io:443
        mirror.gcr.io:443
        pkg-containers.githubusercontent.com:443
        pypi.org:443
        raw.githubusercontent.com:443
        registry.npmjs.org:443
        release-assets.githubusercontent.com:443
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable_harden_runner }}
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: ${{ inputs.harden_runner_egress_policy }}
          allowed-endpoints: ${{ env._HARDEN_DEFAULTS }} ${{ inputs.harden_runner_allowed_endpoints }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  kics:
    if: ${{ inputs.enable_kics }}
    name: IaC Scan (KICS)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write
    env:
      # Built-in defaults — always applied, merged with inputs.harden_runner_allowed_endpoints
      # 9236a389bd48b984df91adc1bc924620.r2.cloudflarestorage.com: KICS queries (Checkmarx R2 storage)
      _HARDEN_DEFAULTS: >-
        9236a389bd48b984df91adc1bc924620.r2.cloudflarestorage.com:443
        agent.api.stepsecurity.io:443
        api.github.com:443
        api0.prismacloud.io:443
        apk.cgr.dev:443
        files.pythonhosted.org:443
        get.trivy.dev:443
        ghcr.io:443
        github.com:443
        kics.io:443
        mirror.gcr.io:443
        pkg-containers.githubusercontent.com:443
        pypi.org:443
        raw.githubusercontent.com:443
        registry.npmjs.org:443
        release-assets.githubusercontent.com:443
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable_harden_runner }}
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: ${{ inputs.harden_runner_egress_policy }}
          allowed-endpoints: ${{ env._HARDEN_DEFAULTS }} ${{ inputs.harden_runner_allowed_endpoints }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run KICS Scan
        uses: checkmarx/kics-github-action@05aa5eb70eede1355220f4ca5238d96b397e30a6 # v2.1.20
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: "."
          ignore_on_exit: results
          enable_annotations: true
          enable_comments: true
          enable_jobs_summary: true
          comments_with_queries: true
          output_path: ./results
          output_formats: json,sarif
      - name: Upload KICS SARIF
        if: ${{ always() && github.event.repository.visibility == 'public' }}
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: ./results/results.sarif
          category: kics

  dependency-review:
    if: ${{ inputs.enable_dependency_review && github.event_name == 'pull_request' }}
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      # Built-in defaults — always applied, merged with inputs.harden_runner_allowed_endpoints
      # 9236a389bd48b984df91adc1bc924620.r2.cloudflarestorage.com: KICS queries (Checkmarx R2 storage)
      _HARDEN_DEFAULTS: >-
        9236a389bd48b984df91adc1bc924620.r2.cloudflarestorage.com:443
        agent.api.stepsecurity.io:443
        api.github.com:443
        api0.prismacloud.io:443
        apk.cgr.dev:443
        files.pythonhosted.org:443
        get.trivy.dev:443
        ghcr.io:443
        github.com:443
        kics.io:443
        mirror.gcr.io:443
        pkg-containers.githubusercontent.com:443
        pypi.org:443
        raw.githubusercontent.com:443
        registry.npmjs.org:443
        release-assets.githubusercontent.com:443
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable_harden_runner }}
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: ${{ inputs.harden_runner_egress_policy }}
          allowed-endpoints: ${{ env._HARDEN_DEFAULTS }} ${{ inputs.harden_runner_allowed_endpoints }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0

  checkov:
    if: ${{ inputs.enable_checkov }}
    name: IaC Scan (Checkov)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      # Built-in defaults — always applied, merged with inputs.harden_runner_allowed_endpoints
      # 9236a389bd48b984df91adc1bc924620.r2.cloudflarestorage.com: KICS queries (Checkmarx R2 storage)
      _HARDEN_DEFAULTS: >-
        9236a389bd48b984df91adc1bc924620.r2.cloudflarestorage.com:443
        agent.api.stepsecurity.io:443
        api.github.com:443
        api0.prismacloud.io:443
        apk.cgr.dev:443
        files.pythonhosted.org:443
        get.trivy.dev:443
        ghcr.io:443
        github.com:443
        kics.io:443
        mirror.gcr.io:443
        pkg-containers.githubusercontent.com:443
        pypi.org:443
        raw.githubusercontent.com:443
        registry.npmjs.org:443
        release-assets.githubusercontent.com:443
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable_harden_runner }}
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: ${{ inputs.harden_runner_egress_policy }}
          allowed-endpoints: ${{ env._HARDEN_DEFAULTS }} ${{ inputs.harden_runner_allowed_endpoints }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: bridgecrewio/checkov-action@0ce65fae06c148e349f955c3c35ad049c11e838c # v12.3092.0
        with:
          directory: .
          framework: ${{ inputs.checkov_framework }}
          quiet: true
          output_format: cli,sarif
          output_file_path: console,checkov-results.sarif
      - name: Upload Checkov SARIF
        if: ${{ always() && github.event.repository.visibility == 'public' }}
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: checkov-results.sarif
          category: checkov

  trivy:
    if: ${{ inputs.enable_trivy }}
    name: IaC Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    env:
      # Built-in defaults — always applied, merged with inputs.harden_runner_allowed_endpoints
      # 9236a389bd48b984df91adc1bc924620.r2.cloudflarestorage.com: KICS queries (Checkmarx R2 storage)
      _HARDEN_DEFAULTS: >-
        9236a389bd48b984df91adc1bc924620.r2.cloudflarestorage.com:443
        agent.api.stepsecurity.io:443
        api.github.com:443
        api0.prismacloud.io:443
        apk.cgr.dev:443
        files.pythonhosted.org:443
        get.trivy.dev:443
        ghcr.io:443
        github.com:443
        kics.io:443
        mirror.gcr.io:443
        pkg-containers.githubusercontent.com:443
        pypi.org:443
        raw.githubusercontent.com:443
        registry.npmjs.org:443
        release-assets.githubusercontent.com:443
    steps:
      - name: Harden Runner
        if: ${{ inputs.enable_harden_runner }}
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: ${{ inputs.harden_runner_egress_policy }}
          allowed-endpoints: ${{ env._HARDEN_DEFAULTS }} ${{ inputs.harden_runner_allowed_endpoints }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run Trivy (table)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 1
          severity: ${{ inputs.trivy_severity }}
      - name: Run Trivy (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: ${{ inputs.trivy_severity }}
      - name: Upload Trivy SARIF
        if: ${{ always() && github.event.repository.visibility == 'public' }}
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: trivy-results.sarif
          category: trivy
