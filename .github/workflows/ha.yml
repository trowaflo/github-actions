name: Home Assistant

# Reusable workflow — Home Assistant CI
# Usage: uses: trowaflo/github-actions/.github/workflows/ha.yml@<sha>
#
# Tous les jobs sont domaine-spécifiques → false par défaut (opt-in explicite)

on:
  workflow_call:
    inputs:
      enable_integration:
        description: "Tests + lint Python (pytest + ruff + codecov)"
        type: boolean
        default: false
      enable_hacs:
        description: "Validation HACS"
        type: boolean
        default: false
      enable_hassfest:
        description: "Validation hassfest"
        type: boolean
        default: false
      enable_config_check:
        description: "HA config check"
        type: boolean
        default: false
      python_version:
        description: "Version Python"
        type: string
        default: "3.13"
      component_name:
        description: "Nom du composant custom (custom_components/<name>) — requis si enable_integration"
        type: string
        default: ""
      ha_version:
        description: "Version Home Assistant — requis si enable_config_check"
        type: string
        default: ""
    secrets:
      codecov_token:
        description: "Token Codecov (optionnel — fonctionne sans pour les repos publics)"
        required: false

jobs:
  test-python:
    if: ${{ inputs.enable_integration == true }}
    name: Test Python
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ inputs.python_version }}
      - name: Install dependencies
        run: pip install pytest pytest-cov "pytest-homeassistant-custom-component==0.13.316"
      - name: Run pytest
        env:
          COMPONENT_NAME: ${{ inputs.component_name }}
        run: |
          pytest \
            --cov=custom_components/$COMPONENT_NAME \
            --cov-report=xml \
            --cov-fail-under=80 \
            tests/ -v
      - uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad # v5
        with:
          token: ${{ secrets.codecov_token }}
          fail_ci_if_error: true

  lint-python:
    if: ${{ inputs.enable_integration == true }}
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ inputs.python_version }}
      - name: Run ruff
        run: |
          pip install ruff
          ruff check .

  hacs:
    if: ${{ inputs.enable_hacs == true }}
    name: HACS Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hacs/action@d556e736723344f83838d08488c983a15381059a # 22.5.0
        with:
          category: integration

  hassfest:
    if: ${{ inputs.enable_hassfest == true }}
    name: Hassfest Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: home-assistant/actions/hassfest@5752577ea7cc5aefb064b0b21432f18fe4d6ba90 # master

  config-check:
    if: ${{ inputs.enable_config_check == true }}
    name: HA Config Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: frenck/action-home-assistant@941d5d917f4c1c7a7e7d4087526daf90d53f4437 # v1.4.1
        with:
          path: .
          ha_version: ${{ inputs.ha_version }}
