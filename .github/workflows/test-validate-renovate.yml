name: Test Validate Renovate Workflow

# Validates lint-renovate.yml using the renovate.json5 at repo root.
#
# Triggered:
#   - workflow_dispatch (manual)
#   - pull_request (every PR)

on:
  workflow_dispatch:
  pull_request:

permissions: {}

jobs:
  validate-renovate:
    name: Test lint-renovate.yml
    uses: ./.github/workflows/lint-renovate.yml
    permissions:
      contents: read
    with:
      harden_runner_egress_policy: block
